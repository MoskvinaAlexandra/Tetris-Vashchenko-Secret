<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vashchenko's Secret</title>
    <link href="https://fonts.cdnfonts.com/css/perpetua-titling-mt" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="vs-shell">
        <nav class="vs-topbar">
            <div class="vs-topbar-links">
                <a href="/leaderboard.html" class="vs-link">Лидеры</a>
                <a href="/vanya.html" class="vs-link">О нас</a>
            </div>
            <div class="vs-topbar-links">
                <button class="vs-button-secondary js-settings-toggle" type="button">Настройки</button>
                <a href="/login.html" class="vs-button-secondary" id="loginBtn">Вход</a>
                <a href="/register.html" class="vs-button-secondary" id="registerBtn">Регистрация</a>
                <a href="/profile.html" class="vs-button-secondary" id="profileBtn" style="display:none;">Профиль</a>
                <button id="logoutBtn" class="vs-button-secondary" style="display:none;">Выход</button>
            </div>
        </nav>

        <header class="vs-header">
            <div class="vs-logo">VS</div>
            <div class="vs-title-wrap">
                <h1 class="vs-title">Vashchenko's Secret</h1>
                <p class="vs-subtitle">Victoria Edition for Competitive Tetris</p>
            </div>
            <div class="vs-logo">VS</div>
        </header>

        <main class="vs-main centered">
            <section class="vs-panel narrow soft">
                <h2 class="vs-section-title">Salon Menu</h2>
                <p class="vs-section-copy">Дуэли, статистика и фирменная эстетика без лишнего хаоса.</p>
                <div class="vs-actions stack">
                    <button class="vs-button" type="button" onclick="location.href='/game.html'">Играть</button>
                    <button class="vs-button" type="button" onclick="location.href='/leaderboard.html'">Статистика</button>
                    <button class="vs-button-secondary" type="button" onclick="location.href='/vanya.html'">Ваня Ващенко</button>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/services/authService.js"></script>
    <script src="/js/settings.js"></script>
    <script>
        if (authService.isLoggedIn()) {
            document.getElementById('profileBtn').style.display = 'inline-flex';
            document.getElementById('logoutBtn').style.display = 'inline-flex';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('registerBtn').style.display = 'none';

            document.getElementById('logoutBtn').addEventListener('click', () => {
                authService.logout();
                location.href = '/';
            });
        }
    </script>
</body>
</html>
