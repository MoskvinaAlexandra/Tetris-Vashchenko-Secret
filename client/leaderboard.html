<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vashchenko's Secret | Лидеры</title>
    <link href="https://fonts.cdnfonts.com/css/perpetua-titling-mt" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/leaderboard.css">
</head>
<body class="leaderboard-page">
    <div class="vs-shell">
        <nav class="vs-nav">
            <div class="vs-nav-links">
                <a href="/" class="vs-link">Главная</a>
                <a href="/game.html" class="vs-link">Играть</a>
                <a href="/leaderboard.html" class="vs-link is-active">Лидеры</a>
                <a href="/profile.html" class="vs-link" id="profileLink" style="display:none;">Профиль</a>
            </div>
            <div class="vs-nav-links">
                <button class="vs-button-secondary js-settings-toggle" type="button">Настройки</button>
                <a href="/login.html" class="vs-link" id="loginBtn">Вход</a>
                <button id="logoutBtn" class="vs-button-secondary" style="display:none;">Выход</button>
            </div>
        </nav>

        <header class="vs-header">
            <div class="vs-logo">VS</div>
            <div class="vs-title-wrap">
                <h1 class="vs-title">Leaderboard</h1>
                <p class="vs-subtitle">Victoria Ranking Table</p>
            </div>
            <div class="vs-logo">VS</div>
        </header>

        <main class="vs-main" role="main">
            <section class="vs-panel">
                <h2 class="vs-section-title">Таблица лидеров</h2>
                <p class="vs-section-copy">Сортируйте рейтинг по любимому показателю и следите за ростом лучших игроков.</p>

                <div class="leaderboard-toolbar">
                    <label class="vs-field" style="min-width:260px;">
                        <span>Сортировка</span>
                        <select id="sortBy" class="vs-select">
                            <option value="best_score">Лучший результат</option>
                            <option value="wins">Победы</option>
                            <option value="games_played">Игр сыграно</option>
                            <option value="total_score">Всего очков</option>
                            <option value="avg_score">Средний результат</option>
                        </select>
                    </label>
                </div>

                <div class="vs-table-wrap">
                    <table class="vs-table" id="leaderboardTable" role="table" aria-label="Таблица лидеров">
                        <caption class="visually-hidden">Глобальный рейтинг игроков Tetris</caption>
                        <thead scope="col">
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Игрок</th>
                                <th scope="col" aria-sort="none">Лучший результат</th>
                                <th scope="col">Победы</th>
                                <th scope="col">Поражения</th>
                                <th scope="col">Игр</th>
                                <th scope="col">Линий</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboardBody">
                            <tr>
                                <td colspan="7">Загрузка...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="errorMessage" class="vs-error" style="display:none; margin-top:16px;"></div>
            </section>
        </main>
    </div>

    <script src="/js/settings.js"></script>
    <script src="/js/services/authService.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
